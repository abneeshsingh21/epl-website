name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: azure-swa
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the EPL compiler
        run: pip install -r requirements.txt

      - name: Build the static site
        run: python build.py

      # Upload the prebuilt dist/ straight to the Azure Static Web App
      # (the SWA that serves https://eplang.me). skip_app_build keeps Oryx
      # from re-building — we already produced dist/ with the EPL compiler.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true
